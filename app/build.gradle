plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    compileSdk 34

    defaultConfig {
        applicationId      "com.posignalbot"
        minSdk             24
        targetSdk          34
        versionCode        1
        versionName        "1.0"
    }

    buildTypes {
        release {
            minifyEnabled   false
            signingConfig   signingConfigs.debug   // debug signing for easy install
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding false
    }

    namespace 'com.posignalbot'
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
}
