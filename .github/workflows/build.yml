name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          curl -L -o /tmp/gradle-8.4-bin.zip \
            https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 \
            --project-dir ${{ github.workspace }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PO-Signal-Bot-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "PO Signal Bot v1.0.${{ github.run_number }}"
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## PO Signal Bot Android App

            Download `app-release.apk` below

            ### Install
            1. Download APK to your phone
            2. Settings → Security → Allow unknown sources
            3. Tap APK → Install
            4. Open app → login to PO → bot connects automatically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
