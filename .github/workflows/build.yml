name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PO-Signal-Bot-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: PO Signal Bot v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## PO Signal Bot Android App

            ### Install
            1. Download the APK file below
            2. On your Android phone: Settings → Security → Allow Unknown Sources
            3. Open the APK and install
            4. Open the app → Login to Pocket Option → Bot connects automatically

            ### What it does
            - Opens Pocket Option in a built-in browser
            - Automatically extracts your session after login
            - Sends it to the signal bot on Render
            - You only need to do this once
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

